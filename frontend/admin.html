<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | AUTO ELITE Detailing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1A1A1A;
            color: #FFFFFF;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #D32F2F;
        }

        .admin-logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #D32F2F;
        }

        .admin-logo i {
            color: #D32F2F;
            margin-right: 10px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-back, .btn-logout {
            background: transparent;
            border: 2px solid #D32F2F;
            color: #D32F2F;
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-back:hover, .btn-logout:hover {
            background: #D32F2F;
            color: #1A1A1A;
            transform: translateY(-2px);
        }

        /* ========== SECCIÓN DE BLOQUEOS ========== */
        .blocks-section {
            background: #2A2A2A;
            border-radius: 28px;
            padding: 32px;
            margin-bottom: 40px;
            border: 1px solid #3A3A3A;
        }

        .blocks-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #D32F2F;
        }

        .blocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
            margin-bottom: 32px;
        }

        .block-card {
            background: #1A1A1A;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #3A3A3A;
        }

        .block-card h3 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: #D32F2F;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .block-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .block-controls select, .block-controls button {
            padding: 10px 16px;
            border-radius: 28px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .block-controls select {
            background: #2A2A2A;
            border: 1px solid #3A3A3A;
            color: #FFFFFF;
            flex: 1;
        }

        .block-controls select option {
            background: #1A1A1A;
            color: #FFFFFF;
        }

        .block-controls button {
            background: #D32F2F;
            border: none;
            color: #FFFFFF;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .block-controls button:hover {
            background: #B71C1C;
            transform: translateY(-2px);
        }

        .blocked-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .blocked-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #2A2A2A;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid #3A3A3A;
        }

        .btn-unblock-small {
            background: rgba(211,47,47,0.2);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: #D32F2F;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .btn-unblock-small:hover {
            background: #D32F2F;
            color: #1A1A1A;
        }

        /* ========== ESTADÍSTICAS ========== */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .stat-card {
            background: #2A2A2A;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #3A3A3A;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #D32F2F;
            margin: 10px 0;
        }

        /* ========== TABLA DE CITAS ========== */
        .admin-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #FFFFFF;
        }

        .appointments-table-container {
            background: #2A2A2A;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid #3A3A3A;
            overflow-x: auto;
        }

        .appointments-table {
            width: 100%;
            border-collapse: collapse;
        }

        .appointments-table th {
            text-align: left;
            padding: 16px 12px;
            background: #1A1A1A;
            color: #D32F2F;
            font-weight: 600;
        }

        .appointments-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #3A3A3A;
            color: #FFFFFF;
        }

        .delete-admin-btn {
            background: rgba(211,47,47,0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: #D32F2F;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-admin-btn:hover {
            background: #D32F2F;
            color: #1A1A1A;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #CCCCCC;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #D32F2F;
            color: #1A1A1A;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            z-index: 2000;
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        @media (max-width: 768px) {
            .blocks-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .appointments-table th, .appointments-table td {
                padding: 10px 8px;
                font-size: 0.85rem;
            }
            .admin-container {
                padding: 20px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-logo">
                <i class="fas fa-spray-can-sparkles"></i> AUTO ELITE | Panel Admin
            </div>
            <div class="header-actions">
                <button class="btn-logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
                <a href="/frontend/index.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Volver al sitio
                </a>
            </div>
        </div>

        <!-- ========== SECCIÓN DE BLOQUEOS ========== -->
        <div class="blocks-section">
            <div class="blocks-title">
                <i class="fas fa-ban"></i>
                <span>Control de Disponibilidad</span>
            </div>
            
            <div class="blocks-grid">
                <!-- Bloquear Días -->
                <div class="block-card">
                    <h3><i class="fas fa-calendar-times"></i> Bloquear Días</h3>
                    <div class="block-controls">
                        <select id="blockDaySelect">
                            <option value="">Seleccionar día</option>
                            <option value="Monday">Lunes</option>
                            <option value="Tuesday">Martes</option>
                            <option value="Wednesday">Miércoles</option>
                            <option value="Thursday">Jueves</option>
                            <option value="Friday">Viernes</option>
                            <option value="Saturday">Sábado</option>
                            <option value="Sunday">Domingo</option>
                        </select>
                        <button id="blockDayBtn">Bloquear</button>
                    </div>
                    <div class="blocked-list" id="blockedDaysList"></div>
                </div>

                <!-- Bloquear Horas -->
                <div class="block-card">
                    <h3><i class="fas fa-hourglass-half"></i> Bloquear Horas</h3>
                    <div class="block-controls">
                        <select id="blockHourSelect">
                            <option value="">Seleccionar hora</option>
                        </select>
                        <button id="blockHourBtn">Bloquear</button>
                    </div>
                    <div class="blocked-list" id="blockedHoursList"></div>
                </div>

                <!-- Configuración Global -->
                <div class="block-card">
                    <h3><i class="fas fa-play-circle"></i> Hora de inicio (global)</h3>
                    <div class="block-controls">
                        <select id="startHourSelect">
                            <option value="06:00">6:00 AM</option>
                            <option value="06:30">6:30 AM</option>
                            <option value="07:00">7:00 AM</option>
                            <option value="07:30">7:30 AM</option>
                            <option value="08:00">8:00 AM</option>
                            <option value="08:30">8:30 AM</option>
                            <option value="09:00">9:00 AM</option>
                            <option value="09:30">9:30 AM</option>
                            <option value="10:00">10:00 AM</option>
                            <option value="10:30">10:30 AM</option>
                            <option value="11:00">11:00 AM</option>
                            <option value="11:30">11:30 AM</option>
                            <option value="12:00">12:00 PM</option>
                            <option value="12:30">12:30 PM</option>
                            <option value="13:00">1:00 PM</option>
                            <option value="13:30">1:30 PM</option>
                            <option value="14:00">2:00 PM</option>
                            <option value="14:30">2:30 PM</option>
                            <option value="15:00">3:00 PM</option>
                            <option value="15:30">3:30 PM</option>
                            <option value="16:00">4:00 PM</option>
                            <option value="16:30">4:30 PM</option>
                            <option value="17:00">5:00 PM</option>
                            <option value="17:30">5:30 PM</option>
                            <option value="18:00">6:00 PM</option>
                        </select>
                        <button id="saveConfigBtn">Guardar configuración</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ========== ESTADÍSTICAS ========== -->
        <div class="stats-cards">
            <div class="stat-card">
                <i class="fas fa-calendar-alt" style="font-size: 2rem; color: #D32F2F;"></i>
                <div class="stat-number" id="totalAppointments">0</div>
                <div>Total de citas</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock" style="font-size: 2rem; color: #D32F2F;"></i>
                <div class="stat-number" id="todayAppointments">0</div>
                <div>Citas de hoy</div>
            </div>
        </div>

        <!-- ========== TABLA DE CITAS ========== -->
        <div class="admin-title">
            <i class="fas fa-list-ul"></i> Gestión de Citas
        </div>
        <div class="appointments-table-container">
            <div id="adminAppointmentsList"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // ========== VARIABLES DE BLOQUEOS ==========
        let blockedDays = [];
        let blockedHours = [];
        let configStartHour = "06:00";

        // ========== FUNCIONES DE AUTENTICACIÓN ==========
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('adminLoggedIn');
            if (!isLoggedIn || isLoggedIn !== 'true') {
                window.location.href = '/frontend/login.html';
                return false;
            }
            return true;
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('adminLoginTime');
            window.location.href = '/frontend/login.html';
        }

        // ========== FUNCIONES DE BLOQUEOS ==========
        
        // Generar opciones de horas (6:00 AM a 6:00 PM)
        function generateHourOptions() {
            const hours = [];
            for (let hour = 6; hour <= 18; hour++) {
                for (let minute of [0, 30]) {
                    if (hour === 18 && minute === 30) break;
                    const timeValue = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
                    const displayHour = hour % 12 || 12;
                    const period = hour >= 12 ? 'PM' : 'AM';
                    hours.push({ value: timeValue, display: `${displayHour}:${minute === 0 ? '00' : minute} ${period}` });
                }
            }
            return hours;
        }

        // Cargar bloqueos desde localStorage
        function loadBlocks() {
            const storedDays = localStorage.getItem('royalcut_blocked_days');
            const storedHours = localStorage.getItem('royalcut_blocked_hours');
            const storedConfig = localStorage.getItem('royalcut_config');
            
            blockedDays = storedDays ? JSON.parse(storedDays) : [];
            blockedHours = storedHours ? JSON.parse(storedHours) : [];
            
            if (storedConfig) {
                const config = JSON.parse(storedConfig);
                configStartHour = config.startHour || "06:00";
                document.getElementById('startHourSelect').value = configStartHour;
            }
            
            renderBlockedDays();
            renderBlockedHours();
            populateHourSelect();
        }

        // Renderizar lista de días bloqueados
        function renderBlockedDays() {
            const container = document.getElementById('blockedDaysList');
            if (!container) return;
            
            const daysNames = {
                'Monday': 'Lunes', 'Tuesday': 'Martes', 'Wednesday': 'Miércoles',
                'Thursday': 'Jueves', 'Friday': 'Viernes', 'Saturday': 'Sábado', 'Sunday': 'Domingo'
            };
            
            if (blockedDays.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align:center;">No hay días bloqueados</p>';
                return;
            }
            
            container.innerHTML = blockedDays.map(day => `
                <div class="blocked-item">
                    <span><i class="fas fa-calendar-times"></i> ${daysNames[day] || day}</span>
                    <button class="btn-unblock-small" data-day="${day}">Desbloquear</button>
                </div>
            `).join('');
            
            document.querySelectorAll('[data-day]').forEach(btn => {
                btn.addEventListener('click', () => unblockDay(btn.dataset.day));
            });
        }

        // Renderizar lista de horas bloqueadas
        function renderBlockedHours() {
            const container = document.getElementById('blockedHoursList');
            if (!container) return;
            
            const allHours = generateHourOptions();
            
            if (blockedHours.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align:center;">No hay horas bloqueadas</p>';
                return;
            }
            
            container.innerHTML = blockedHours.map(hour => {
                const hourDisplay = allHours.find(h => h.value === hour)?.display || hour;
                return `
                    <div class="blocked-item">
                        <span><i class="fas fa-hourglass-half"></i> ${hourDisplay}</span>
                        <button class="btn-unblock-small" data-hour="${hour}">Desbloquear</button>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('[data-hour]').forEach(btn => {
                btn.addEventListener('click', () => unblockHour(btn.dataset.hour));
            });
        }

        // Poblar select de horas
        function populateHourSelect() {
            const select = document.getElementById('blockHourSelect');
            if (!select) return;
            
            const allHours = generateHourOptions();
            select.innerHTML = '<option value="">Seleccionar hora</option>';
            allHours.forEach(hour => {
                const option = document.createElement('option');
                option.value = hour.value;
                option.textContent = hour.display;
                select.appendChild(option);
            });
        }

        // Bloquear día
        async function blockDay(day) {
            if (!blockedDays.includes(day)) {
                blockedDays.push(day);
                localStorage.setItem('royalcut_blocked_days', JSON.stringify(blockedDays));
                renderBlockedDays();
                showToast('✅ Día bloqueado correctamente');
            } else {
                showToast('⚠️ Este día ya está bloqueado');
            }
        }

        // Desbloquear día
        async function unblockDay(day) {
            blockedDays = blockedDays.filter(d => d !== day);
            localStorage.setItem('royalcut_blocked_days', JSON.stringify(blockedDays));
            renderBlockedDays();
            showToast('✅ Día desbloqueado correctamente');
        }

        // Bloquear hora
        async function blockHour(hour) {
            if (!blockedHours.includes(hour)) {
                blockedHours.push(hour);
                localStorage.setItem('royalcut_blocked_hours', JSON.stringify(blockedHours));
                renderBlockedHours();
                showToast('✅ Hora bloqueada correctamente');
            } else {
                showToast('⚠️ Esta hora ya está bloqueada');
            }
        }

        // Desbloquear hora
        async function unblockHour(hour) {
            blockedHours = blockedHours.filter(h => h !== hour);
            localStorage.setItem('royalcut_blocked_hours', JSON.stringify(blockedHours));
            renderBlockedHours();
            showToast('✅ Hora desbloqueada correctamente');
        }

        // Guardar configuración global
        function saveGlobalConfig() {
            const startHour = document.getElementById('startHourSelect').value;
            const config = { startHour, blockedHours, blockedDays };
            localStorage.setItem('royalcut_config', JSON.stringify(config));
            showToast('✅ Configuración global guardada');
        }

        // ========== FUNCIONES DE CITAS ==========
        function formatHourForDisplay(hourValue) {
            if (!hourValue) return '--:--';
            const [h, m] = hourValue.split(':');
            const hour = parseInt(h);
            const period = hour >= 12 ? 'PM' : 'AM';
            const displayHour = hour % 12 || 12;
            return `${displayHour}:${m} ${period}`;
        }

        async function getAppointments() {
            try {
                const response = await fetch(`${API_URL}/appointments`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.success) {
                    renderAppointments(data.data);
                    updateStats(data.data);
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ Error al cargar las citas');
                document.getElementById('adminAppointmentsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 16px;"></i>
                        <p>Error al conectar con el servidor</p>
                        <p style="font-size: 0.8rem; margin-top: 8px;">Verifica que el backend esté corriendo en ${API_URL}</p>
                    </div>
                `;
            }
        }

        async function deleteAppointment(id) {
            if (!confirm('¿Eliminar esta cita permanentemente?')) return;
            try {
                const response = await fetch(`${API_URL}/appointments/${id}`, { method: 'DELETE' });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Error al eliminar');
                showToast('✅ Cita eliminada correctamente');
                await getAppointments();
            } catch (error) {
                console.error('Error:', error);
                showToast('❌ Error al eliminar la cita');
            }
        }

        function renderAppointments(appointments) {
            const container = document.getElementById('adminAppointmentsList');
            if (!container) return;
            
            if (appointments.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <i class="fas fa-calendar-times" style="font-size: 3rem; margin-bottom: 16px;"></i>
                    <p>No hay citas agendadas</p>
                </div>`;
                return;
            }
            
            let html = `
                <table class="appointments-table">
                    <thead>
                        <tr><th>Cliente</th><th>Teléfono</th><th>Servicio</th><th>Ciudad</th><th>Vehículo</th><th>Precio</th><th>Hora</th><th>Fecha registro</th><th>Acciones</th></tr></thead>
                    <tbody>
            `;
            
            appointments.forEach(app => {
                const fechaRegistro = app.createdAt ? new Date(app.createdAt).toLocaleString() : 'Fecha no disponible';
                const horaFormateada = formatHourForDisplay(app.hora);
                html += `
                    <tr>
                        <td>${escapeHtml(app.nombre)} ${escapeHtml(app.apellido)}</td>
                        <td>${escapeHtml(app.telefono)}</td>
                        <td>${escapeHtml(app.servicio || 'BÁSICO')}</td>
                        <td>${escapeHtml(app.ciudad || 'Santo Domingo')}</td>
                        <td>${escapeHtml(app.vehiculo || 'Carro')}</td>
                        <td>RD$${(app.precio || 0).toLocaleString()}</td>
                        <td>${horaFormateada}</td>
                        <td>${fechaRegistro}</td>
                        <td><button class="delete-admin-btn" onclick="deleteAppointment('${app._id}')"><i class="fas fa-trash-alt"></i> Eliminar</button></td>
                    </tr>
                `;
            });
            
            html += `</tbody>}</table>`;
            container.innerHTML = html;
        }

        function updateStats(appointments) {
            const total = appointments.length;
            const today = new Date().toISOString().split('T')[0];
            const todayCount = appointments.filter(app => app.createdAt ? app.createdAt.split('T')[0] === today : false).length;
            document.getElementById('totalAppointments').textContent = total;
            document.getElementById('todayAppointments').textContent = todayCount;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== INICIALIZACIÓN ==========
        if (checkAuth()) {
            loadBlocks();
            getAppointments();
            
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('blockDayBtn').addEventListener('click', () => {
                const day = document.getElementById('blockDaySelect').value;
                if (day) blockDay(day);
                else showToast('⚠️ Selecciona un día', true);
            });
            document.getElementById('blockHourBtn').addEventListener('click', () => {
                const hour = document.getElementById('blockHourSelect').value;
                if (hour) blockHour(hour);
                else showToast('⚠️ Selecciona una hora', true);
            });
            document.getElementById('saveConfigBtn').addEventListener('click', saveGlobalConfig);
        }
    </script>
</body>
</html>
